dashboard:
  enabled: true
  ingress:
    enabled: true
    className: traefik
    host: dashboard.example.internal
  config:
    public:
      timeframe: 15m
      stake_currency: USDT
      stake_amount: unlimited
      dry_run_wallet: 1000
      max_open_trades: 5
      exchange:
        name: binance
        key: ""
        secret: ""
        ccxt_config: {}
        ccxt_async_config: {}
        pair_whitelist:
          - BTC/USDT
          - ETH/USDT
        pair_blacklist: []
      pairlists:
        - method: StaticPairList
    secret:
      api_server:
        username: dashboard
        password: dashboard-password
        jwt_secret_key: dashboard_jwt_secret_key_32_chars
        ws_token: dashboard_ws_token_32_chars_min
  dataJobs:
    enabled: true
    downloadData:
      enabled: true
      pairs:
        - BTC/USDT
        - ETH/USDT
      timeframes:
        - 15m

bots:
  - name: ichi
    enabled: true
    mode: dryRun
    strategy:
      name: Ichi
      source:
        type: image
    api:
      enabled: true
      corsOrigins:
        - http://dashboard.example.internal
    ui:
      enabled: true
    ingress:
      enabled: true
      className: traefik
      host: ichi.example.internal
    config:
      public:
        timeframe: 15m
        stake_currency: USDT
        stake_amount: unlimited
        dry_run_wallet: 100
        max_open_trades: 5
        exchange:
          name: binance
          key: ""
          secret: ""
          ccxt_config: {}
          ccxt_async_config: {}
          pair_whitelist:
            - BTC/USDT
            - ETH/USDT
          pair_blacklist: []
        pairlists:
          - method: StaticPairList
        entry_pricing:
          price_side: same
          use_order_book: true
          order_book_top: 1
        exit_pricing:
          price_side: same
          use_order_book: true
          order_book_top: 1
      secret:
        api_server:
          username: ichi
          password: ichi-password
          jwt_secret_key: ichi_jwt_secret_key_32_chars_min
          ws_token: ichi_ws_token_32_chars_minimum

  - name: swing
    enabled: true
    mode: dryRun
    strategy:
      name: SwingStrategy
      source:
        type: image
    api:
      enabled: true
      corsOrigins:
        - http://dashboard.example.internal
    ui:
      enabled: false
    config:
      public:
        timeframe: 1h
        stake_currency: USDT
        stake_amount: unlimited
        dry_run_wallet: 1000
        max_open_trades: 3
        exchange:
          name: binance
          key: ""
          secret: ""
          ccxt_config: {}
          ccxt_async_config: {}
          pair_whitelist:
            - BTC/USDT
            - ETH/USDT
            - SOL/USDT
          pair_blacklist: []
        pairlists:
          - method: StaticPairList
        entry_pricing:
          price_side: same
          use_order_book: true
          order_book_top: 1
        exit_pricing:
          price_side: same
          use_order_book: true
          order_book_top: 1
      secret:
        api_server:
          username: swing
          password: swing-password
          jwt_secret_key: swing_jwt_secret_key_32_chars
          ws_token: swing_ws_token_32_chars_minimum
