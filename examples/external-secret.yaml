bots:
  - name: external-secret
    enabled: true
    mode: dryRun
    strategy:
      name: ExternalSecretStrategy
      source:
        type: image
    api:
      enabled: true
    ui:
      enabled: false
    config:
      public:
        timeframe: 15m
        stake_currency: USDT
        stake_amount: unlimited
        dry_run_wallet: 1000
        max_open_trades: 5
        exchange:
          name: binance
          pair_whitelist:
            - BTC/USDT
            - ETH/USDT
          pair_blacklist: []
        pairlists:
          - method: StaticPairList
        entry_pricing:
          price_side: same
          use_order_book: true
          order_book_top: 1
        exit_pricing:
          price_side: same
          use_order_book: true
          order_book_top: 1
      externalSecret:
        enabled: true
        refreshInterval: 1h
        secretStoreRef:
          name: platform-secrets
          kind: ClusterSecretStore
        target:
          name: external-secret-private-config
          creationPolicy: Owner
        data:
          - secretKey: config-private.json
            remoteRef:
              key: freqtrade/external-secret
