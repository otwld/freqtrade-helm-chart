dashboard:
  enabled: true
  persistence:
    enabled: true
    existingClaim: freqtrade-dashboard-user-data
  config:
    public:
      timeframe: 15m
      stake_currency: USDT
      stake_amount: unlimited
      dry_run_wallet: 1000
      max_open_trades: 5
      exchange:
        name: binance
        key: ""
        secret: ""
        ccxt_config: {}
        ccxt_async_config: {}
        pair_whitelist:
          - BTC/USDT
          - ETH/USDT
        pair_blacklist: []
      pairlists:
        - method: StaticPairList
    secret:
      api_server:
        username: dashboard
        password: dashboard-password
        jwt_secret_key: dashboard_jwt_secret_key_32_chars
        ws_token: dashboard_ws_token_32_chars_min

bots:
  - name: existing-pvc
    enabled: true
    mode: dryRun
    strategy:
      name: ExistingPvcStrategy
      source:
        type: image
    persistence:
      enabled: true
      existingClaim: freqtrade-existing-bot-user-data
    config:
      public:
        timeframe: 15m
        stake_currency: USDT
        stake_amount: unlimited
        dry_run_wallet: 1000
        max_open_trades: 3
        exchange:
          name: binance
          key: ""
          secret: ""
          ccxt_config: {}
          ccxt_async_config: {}
          pair_whitelist:
            - BTC/USDT
            - ETH/USDT
          pair_blacklist: []
        pairlists:
          - method: StaticPairList
        entry_pricing:
          price_side: same
          use_order_book: true
          order_book_top: 1
        exit_pricing:
          price_side: same
          use_order_book: true
          order_book_top: 1
      secret:
        api_server:
          username: existing-pvc
          password: existing-pvc-password
          jwt_secret_key: existing_pvc_jwt_secret_key_32ch
          ws_token: existing_pvc_ws_token_32char_min
