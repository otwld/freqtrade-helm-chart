bots:
  - name: private-ui
    enabled: true
    mode: dryRun
    strategy:
      name: PrivateUiStrategy
      source:
        type: image
    api:
      enabled: true
    ui:
      enabled: true
    ingress:
      enabled: false
    config:
      public:
        timeframe: 15m
        stake_currency: USDT
        stake_amount: unlimited
        dry_run_wallet: 1000
        max_open_trades: 5
        exchange:
          name: binance
          key: ""
          secret: ""
          ccxt_config: {}
          ccxt_async_config: {}
          pair_whitelist:
            - BTC/USDT
            - ETH/USDT
          pair_blacklist: []
        pairlists:
          - method: StaticPairList
        entry_pricing:
          price_side: same
          use_order_book: true
          order_book_top: 1
        exit_pricing:
          price_side: same
          use_order_book: true
          order_book_top: 1
      secret:
        api_server:
          username: private-ui
          password: private-ui-password
          jwt_secret_key: private_ui_jwt_secret_key_32_char
          ws_token: private_ui_ws_token_32_char_min
