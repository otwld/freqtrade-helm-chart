mode:
  type: downloadData
  extraArgs:
    - --days
    - "14"
    - --pairs
    - BTC/USDT
    - --timeframes
    - 15m

config:
  public:
    dry_run: true
    exchange:
      name: binance
      key: ""
      secret: ""
      ccxt_config: {}
      ccxt_async_config: {}

api:
  enabled: false

service:
  enabled: false

persistence:
  enabled: true
  # Reuse the companion webserver PVC so freqUI can see downloaded market data.
  # If the claim is ReadWriteOnce and already mounted by the webserver, pin this Job to the same node or use RWX storage.
  existingClaim: freqtrade-webserver-user-data

# Example for RWO storage shared with a running webserver:
# nodeSelector:
#   kubernetes.io/hostname: poseidon

resources:
  requests:
    cpu: 250m
    memory: 512Mi
  limits:
    cpu: 1000m
    memory: 1Gi
