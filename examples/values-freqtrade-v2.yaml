global:
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: 1000m
      memory: 1Gi

dashboard:
  enabled: true
  ingress:
    enabled: true
    className: traefik
    host: dashboard.freqtrade-v2.local
  config:
    public:
      timeframe: 15m
      stake_currency: USDT
      stake_amount: unlimited
      dry_run_wallet: 1000
      max_open_trades: 5
      exchange:
        name: binance
        key: ""
        secret: ""
        ccxt_config: {}
        ccxt_async_config: {}
        pair_whitelist:
          - BTC/USDT
          - ETH/USDT
        pair_blacklist: []
      pairlists:
        - method: StaticPairList
    secret:
      api_server:
        username: dashboard
        password: dashboard-password
        jwt_secret_key: dashboardsecretkeydashboardsecret12
        ws_token: dashboardwstoken_dashboardwstoken
  dataJobs:
    enabled: true
    downloadData:
      enabled: true
      pairs:
        - BTC/USDT
        - ETH/USDT
      timeframes:
        - 15m

bots:
  - name: ichi
    enabled: true
    mode: dryRun
    strategy:
      name: Ichi
      source:
        type: initSync
        initSync:
          enabled: true
          command:
            - /bin/sh
            - -ec
            - |
              rm -rf /tmp/src
              git clone --depth 1 https://github.com/davidzr/freqtrade-strategies.git /tmp/src
              mkdir -p /freqtrade/user_data/strategies
              cp /tmp/src/strategies/Ichi/Ichi.py /freqtrade/user_data/strategies/Ichi.py
    ui:
      enabled: true
    ingress:
      enabled: true
      className: traefik
      host: ichi.freqtrade-v2.local
    api:
      enabled: true
      corsOrigins:
        - http://dashboard.freqtrade-v2.local
    config:
      public:
        timeframe: 15m
        tradable_balance_ratio: 0.99
        fiat_display_currency: USD
        stake_amount: unlimited
        stake_currency: USDT
        amend_last_stake_amount: true
        exchange:
          name: binance
          key: ""
          secret: ""
          ccxt_config: {}
          ccxt_async_config: {}
          pair_whitelist:
            - BTC/USDT
            - BCH/USDT
            - ETH/USDT
            - LINK/USDT
            - LTC/USDT
            - SOL/USDT
            - BNB/USDT
            - XRP/USDT
            - ADA/USDT
            - DOT/USDT
            - ETC/USDT
            - ALGO/USDT
            - LUNA/USDT
          pair_blacklist: []
        pairlists:
          - method: StaticPairList
        dry_run_wallet: 100
        max_open_trades: 5
        entry_pricing:
          price_side: same
          use_order_book: true
          order_book_top: 1
        exit_pricing:
          price_side: same
          use_order_book: true
          order_book_top: 1
      secret:
        api_server:
          username: freqtrade
          password: fredtrade-test
          jwt_secret_key: ichiapi_jwt_secret_key_32charsmin
          ws_token: ichiapi_ws_token_32charsminimum

