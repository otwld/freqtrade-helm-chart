bots:
  - name: telegram-bot
    enabled: true
    mode: dryRun
    strategy:
      name: SampleStrategy
      source:
        type: image
    api:
      enabled: true
    ui:
      enabled: false
    telegram:
      enabled: true
      token: "123456789:replace-with-bot-token"
      chatId: "123456789"
      topicId: ""
      authorizedUsers:
        - your-telegram-username
      allowCustomMessages: true
      reload: true
      balanceDustLevel: 0.01
      notificationSettings:
        status: silent
        warning: on
        startup: off
        entry: silent
        exit:
          "*": off
          roi: silent
      keyboard:
        - ["/daily", "/profit", "/balance"]
        - ["/status", "/performance"]
        - ["/start", "/stop", "/help"]
    config:
      public:
        timeframe: 15m
        stake_currency: USDT
        stake_amount: unlimited
        dry_run_wallet: 1000
        max_open_trades: 3
        exchange:
          name: binance
          key: ""
          secret: ""
          ccxt_config: {}
          ccxt_async_config: {}
          pair_whitelist:
            - BTC/USDT
            - ETH/USDT
          pair_blacklist: []
        pairlists:
          - method: StaticPairList
        entry_pricing:
          price_side: same
          use_order_book: true
          order_book_top: 1
        exit_pricing:
          price_side: same
          use_order_book: true
          order_book_top: 1
      secret:
        api_server:
          username: telegram-bot
          password: telegram-bot-password
          jwt_secret_key: telegram_bot_jwt_secret_key_32_chars
          ws_token: telegram_bot_ws_token_32_chars_min
