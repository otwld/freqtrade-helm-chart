mode:
  type: dryRun

strategy:
  name: SampleStrategy
  mode: image

config:
  public:
    dry_run: true
    db_url: sqlite:////freqtrade/user_data/tradesv3.dryrun.sqlite
    timeframe: 15m
    max_open_trades: 1
    stake_currency: USDT
    stake_amount: 50
    exchange:
      name: binance
      key: ""
      secret: ""
      ccxt_config: {}
      ccxt_async_config: {}
      pair_whitelist:
        - BTC/USDT
      pair_blacklist: []
    pairlists:
      - method: StaticPairList
    entry_pricing:
      price_side: same
      use_order_book: true
      order_book_top: 1
    exit_pricing:
      price_side: same
      use_order_book: true
      order_book_top: 1
  sensitive:
    api_server:
      username: freqtrade
      password: ui-demo-password
      jwt_secret_key: ui-demo-jwt-secret
      ws_token: ui-demo-ws-token

api:
  enabled: true

ui:
  enabled: true
  ingress:
    enabled: true
    className: traefik
    annotations:
      traefik.ingress.kubernetes.io/router.entrypoints: websecure
    hosts:
      - host: freqtrade-ui.example.com
        paths:
          - path: /
            pathType: Prefix

service:
  enabled: true

persistence:
  enabled: true
  size: 5Gi

resources:
  requests:
    cpu: 250m
    memory: 512Mi
  limits:
    cpu: 1000m
    memory: 1Gi
