mode:
  type: webserver

strategy:
  name: Ichi
  mode: initSync
  initSync:
    enabled: true
    env:
      - name: STRATEGY_GIT_URL
        value: https://github.com/davidzr/freqtrade-strategies.git
    command:
      - /bin/sh
      - -ec
      - |
        test -n "${STRATEGY_GIT_URL:-}" || { echo "STRATEGY_GIT_URL is required"; exit 1; }
        rm -rf /tmp/src /work/strategies
        git clone --depth 1 "${STRATEGY_GIT_URL}" /tmp/src
        mkdir -p /work/strategies
        cp /tmp/src/strategies/Ichi/Ichi.py /work/strategies/Ichi.py

config:
  public:
    bot_name: freqtrade-webserver
    dry_run: true
    db_url: sqlite:////freqtrade/user_data/tradesv3.webserver.sqlite
    timeframe: 15m
    stake_currency: USDT
    stake_amount: unlimited
    dry_run_wallet: 100
    max_open_trades: 5
    fiat_display_currency: USD
    tradable_balance_ratio: 0.99
    amend_last_stake_amount: true
    exchange:
      name: binance
      key: ""
      secret: ""
      ccxt_config: {}
      ccxt_async_config: {}
      pair_whitelist:
        - BTC/USDT
      pair_blacklist: []
    pairlists:
      - method: StaticPairList
    entry_pricing:
      price_side: same
      use_order_book: true
      order_book_top: 1
    exit_pricing:
      price_side: same
      use_order_book: true
      order_book_top: 1
  sensitive:
    api_server:
      username: freqtrade
      password: webserver-demo-password
      jwt_secret_key: webserver-demo-jwt-secret
      ws_token: webserver-demo-ws-token

api:
  enabled: true

ui:
  enabled: true
  ingress:
    enabled: true
    className: traefik
    annotations:
      traefik.ingress.kubernetes.io/router.entrypoints: websecure
      traefik.ingress.kubernetes.io/router.middlewares: kube-system-google-auth@kubernetescrd
    hosts:
      - host: freqtrade.otwld.com
        paths:
          - path: /
            pathType: Prefix

service:
  enabled: true

persistence:
  enabled: true
  size: 5Gi

resources:
  requests:
    cpu: 250m
    memory: 512Mi
  limits:
    cpu: 1000m
    memory: 1Gi
