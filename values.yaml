# Global defaults applied to the dashboard and every bot unless overridden.
global:
  nameOverride: ""
  fullnameOverride: ""

  image:
    repository: freqtradeorg/freqtrade
    tag: stable
    pullPolicy: IfNotPresent
    pullSecrets: []

  serviceAccount:
    create: false
    name: ""
    annotations: {}
    automountToken: false

  podSecurityContext:
    fsGroup: 1000
    fsGroupChangePolicy: OnRootMismatch

  containerSecurityContext:
    runAsUser: 1000
    runAsGroup: 1000
    runAsNonRoot: true
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL
    seccompProfile:
      type: RuntimeDefault

  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits: {}

  podAnnotations: {}
  podLabels: {}

  env: []
  envFrom: []
  initContainers: []
  extraContainers: []
  extraVolumes: []
  extraVolumeMounts: []

  nodeSelector: {}
  affinity: {}
  tolerations: []
  topologySpreadConstraints: []
  priorityClassName: ""

  terminationGracePeriodSeconds: 60
  lifecycle: {}

  probes:
    startup:
      enabled: true
      initialDelaySeconds: 10
      periodSeconds: 10
      timeoutSeconds: 5
      failureThreshold: 30
    readiness:
      enabled: true
      initialDelaySeconds: 5
      periodSeconds: 10
      timeoutSeconds: 5
      failureThreshold: 6
      successThreshold: 1
    liveness:
      enabled: true
      initialDelaySeconds: 30
      periodSeconds: 15
      timeoutSeconds: 5
      failureThreshold: 6

  networkPolicy:
    enabled: false
    ingress:
      from: []
    egress:
      allowDns: true
      rules: []

# Shared dashboard running `freqtrade webserver`.
# This is analysis-first and does not automatically aggregate bot state unless
# bot APIs are intentionally exposed and added to FreqUI.
dashboard:
  enabled: false

  image: {}
  command: []
  args: []
  extraArgs: []

  api:
    enabled: true
    port: 8080
    corsOrigins: []

  ui:
    enabled: true

  service:
    type: ClusterIP
    annotations: {}

  ingress:
    enabled: false
    className: ""
    annotations: {}
    host: ""
    path: /
    pathType: Prefix
    tls: []

  # Public settings become `/etc/freqtrade/config.json`.
  # Secret settings become `/etc/freqtrade/config-private.json` unless an
  # existing Secret or ExternalSecret is used instead.
  config:
    public: {}
    secret: {}
    existingSecret: ""
    existingSecretKey: config-private.json
    externalSecret:
      enabled: false
      refreshInterval: 1h
      secretStoreRef:
        name: ""
        kind: ClusterSecretStore
      target:
        name: ""
        creationPolicy: Owner
      data: []
      dataFrom: []

  persistence:
    enabled: true
    mountPath: /freqtrade/user_data
    existingClaim: ""
    accessModes:
      - ReadWriteOnce
    size: 20Gi
    storageClassName: ""
    annotations: {}

  resources: {}
  podSecurityContext: {}
  containerSecurityContext: {}
  podAnnotations: {}
  podLabels: {}
  env: []
  envFrom: []
  initContainers: []
  extraContainers: []
  extraVolumes: []
  extraVolumeMounts: []
  nodeSelector: {}
  affinity: {}
  tolerations: []
  topologySpreadConstraints: []
  priorityClassName: ""
  terminationGracePeriodSeconds: null
  lifecycle: {}
  probes: {}
  networkPolicy: {}

  dataJobs:
    enabled: false
    downloadData:
      enabled: false
      schedule: ""
      successfulJobsHistoryLimit: 1
      failedJobsHistoryLimit: 1
      ttlSecondsAfterFinished: 86400
      backoffLimit: 1
      activeDeadlineSeconds: null
      days: 14
      erase: false
      pairs: []
      timeframes:
        - 15m
      extraArgs: []
      resources:
        requests:
          cpu: 100m
          memory: 256Mi
        limits: {}

# Independent trading bots. Each entry renders isolated resources named
# `<release>-bot-<name>`.
#
# Required bot settings:
# - `enabled`: optional, defaults to `true`
# - `name`
# - `mode`: `trade` or `dryRun`
# - `strategy.name`
# - `config.public.exchange.name`
# - `config.public.stake_currency`
# - `config.public.stake_amount`
# - `config.public.timeframe`
# - `config.public.pairlists`
# - `config.public.entry_pricing`
# - `config.public.exit_pricing`
#
# Secret handling:
# - inline `config.secret`
# - or `config.existingSecret`
# - or `config.externalSecret`
#
# Strategy delivery:
# - `strategy.source.type=image` for strategies baked into the image
# - `strategy.source.type=volume` for a dedicated strategy PVC
# - `strategy.source.type=initSync` to pull strategies before start
#
# Telegram:
# - Telegram is configured per bot, not on the shared dashboard
# - Set `telegram.enabled=true` and provide at least `token` and `chatId`
# - `topicId` and `authorizedUsers` are useful when using group chats
# - `notificationSettings` is passed through to Freqtrade as-is
# - Do not also define `config.public.telegram` or `config.secret.telegram`
#   when using the chart-managed `telegram` block
# - Keep `token` and `chatId` in a secure values file or secret-management flow
#
# Minimal bot example:
# bots:
#   - name: sample
#     enabled: true
#     mode: dryRun
#     strategy:
#       name: SampleStrategy
#       source:
#         type: image
#     telegram:
#       enabled: true
#       token: "123456:bot-token"
#       chatId: "123456789"
#       topicId: ""
#       authorizedUsers: []
#       allowCustomMessages: true
#       reload: true
#       balanceDustLevel: 0.01
#       notificationSettings:
#         status: silent
#         warning: on
#         startup: off
#         entry: silent
#         exit:
#           "*": off
#           roi: silent
bots: []
