{{- include "freqtrade.validate" . }}
{{- if and .Values.persistence.enabled (not .Values.persistence.existingClaim) }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "freqtrade.userDataClaimName" . }}
  labels:
    {{- include "freqtrade.labels" . | nindent 4 }}
  {{- with .Values.persistence.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  accessModes:
    {{- toYaml .Values.persistence.accessModes | nindent 4 }}
  resources:
    requests:
      storage: {{ .Values.persistence.size }}
  {{- with .Values.persistence.storageClassName }}
  storageClassName: {{ . }}
  {{- end }}
{{- end }}
{{- if and (eq .Values.strategy.mode "volume") (not .Values.strategy.volume.existingClaim) }}
{{- if and .Values.persistence.enabled (not .Values.persistence.existingClaim) }}
---
{{- end }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "freqtrade.strategyClaimName" . }}
  labels:
    {{- include "freqtrade.labels" . | nindent 4 }}
  {{- with .Values.strategy.volume.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  accessModes:
    {{- toYaml .Values.strategy.volume.accessModes | nindent 4 }}
  resources:
    requests:
      storage: {{ .Values.strategy.volume.size }}
  {{- with .Values.strategy.volume.storageClassName }}
  storageClassName: {{ . }}
  {{- end }}
{{- end }}
