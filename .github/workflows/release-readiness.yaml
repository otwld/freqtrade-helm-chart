name: Release Readiness

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  package:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Validate chart metadata
        run: |
          test -n "$(sed -n 's/^version: //p' Chart.yaml)"
          test -n "$(sed -n 's/^appVersion: //p' Chart.yaml)"

      - name: Lint chart and examples
        run: ./scripts/lint-examples.sh .

      - name: Package chart
        run: helm package . --destination dist

      - name: Upload packaged chart
        uses: actions/upload-artifact@v4
        with:
          name: freqtrade-chart-package
          path: dist/*.tgz

