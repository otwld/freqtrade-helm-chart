name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  validate:
    name: Lint, docs, and package
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Generate docs
        run: ./scripts/generate-docs.sh

      - name: Verify generated docs are committed
        run: git diff --exit-code -- README.md

      - name: Lint chart and examples
        run: ./scripts/lint-examples.sh .

      - name: Package chart
        run: helm package . --destination dist

      - name: Upload chart artifact
        uses: actions/upload-artifact@v4
        with:
          name: chart-package
          path: dist/*.tgz
