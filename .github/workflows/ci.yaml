name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Lint chart
        run: helm lint .

      - name: Lint and render examples
        run: ./scripts/lint-examples.sh .

      - name: Package chart
        run: helm package . --destination .artifacts

      - name: Upload chart artifact
        uses: actions/upload-artifact@v4
        with:
          name: chart-package
          path: .artifacts/*.tgz

